<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../content/core/ui.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- List of supported games -->
    <section id="list-view" class="view">
      <header class="header">
        <h1>hackTheLink</h1>
      </header>
      <p class="subtitle">Available games</p>
      <ul id="game-list" class="game-list"></ul>
    </section>

    <!-- Detail for the selected game -->
    <section id="detail-view" class="view" hidden>
      <header class="header header--detail">
        <button id="back" type="button" class="back" aria-label="Back">←</button>
        <img id="detail-icon" class="detail-icon" alt="" />
        <h1 id="detail-name"></h1>
      </header>

      <section class="actions">
        <button id="go" type="button" class="btn">Go to game</button>
        <button id="solve" type="button" class="btn btn--primary">Solve</button>
      </section>

      <div class="solve-options">
        <div id="toggle"></div>
        <div class="solve-options__divider"></div>
        <div id="solve-time"></div>
      </div>

      <section id="preview" class="preview" hidden>
        <div class="preview__head">
          <span>Map loaded</span>
          <span id="dims" class="preview__dims"></span>
        </div>
        <div id="spoiler" class="game-spoiler">
          <div class="game-preview"><canvas id="canvas" class="game-canvas"></canvas></div>
          <button type="button" class="game-spoiler__cover">
            <span class="game-spoiler__label">See spoiler</span>
          </button>
        </div>
      </section>

      <p id="status" class="status"></p>
    </section>

    <script src="../content/core/Settings.js"></script>
    <script src="../content/core/GameCatalog.js"></script>
    <script src="../content/core/GameViews.js"></script>
    <script src="../content/core/Controls.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
